<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organizador de Tarefas</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<header>
  <h1>Organizador de Tarefas</h1>
  <p>Crie, organize e acompanhe suas tarefas com prioridades e prazos</p>
</header>

<div class="container">

  <div class="form-card">
    <button class="btn-toggle-form" onclick="toggleForm()">
      <span>NOVA TAREFA</span>
      <span id="icone-toggle">▼</span>
    </button>
    
    <div id="form-nova-tarefa" class="form-content">
      <div class="form-grid">

        <div class="form-grupo largo">
          <label for="titulo-input">Título</label>
          <input id="titulo-input" type="text" placeholder="Ex: Estudar para a prova de cálculo"/>
        </div>

        <div class="form-grupo largo">
          <label for="desc-input">Descrição <span style="color:#44445a;font-weight:400">(opcional)</span></label>
          <textarea id="desc-input" placeholder="Adicione detalhes ou anotações sobre essa tarefa..."></textarea>
        </div>

        <div class="form-grupo">
          <label for="prioridade-select">Prioridade</label>
          <select id="prioridade-select">
            <option value="baixa">Baixa</option>
            <option value="media" selected>Média</option>
            <option value="alta">Alta</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="prazo-input">Prazo</label>
          <input id="prazo-input" type="date"/>
        </div>

        <div class="form-grupo" style="justify-content:flex-end;">
          <label style="visibility:hidden">.</label>
          <button class="btn-adicionar" onclick="criarTarefa()">+ Adicionar</button>
        </div>

      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-valor" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-valor" id="stat-pendentes">0</div>
      <div class="stat-label">Pendentes</div>
    </div>
    <div class="stat">
      <div class="stat-valor" id="stat-concluidas">0</div>
      <div class="stat-label">Concluídas</div>
    </div>
  </div>

  <div class="secao-titulo">Filtrar por</div>
  <div class="filtros">
    <button class="filtro-btn ativo" onclick="definirFiltro('pendentes', this)">Pendentes</button>
    <button class="filtro-btn" onclick="definirFiltro('concluidas', this)">Concluídas</button>
    <button class="filtro-btn" onclick="definirFiltro('alta', this)">Alta prioridade</button>
    <button class="filtro-btn" onclick="definirFiltro('media', this)">Média prioridade</button>
    <button class="filtro-btn" onclick="definirFiltro('baixa', this)">Baixa prioridade</button>
  </div>

  <div id="lista-tarefas"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Remover tarefa?</h3>
    <p>Essa ação não pode ser desfeita.<br/>A tarefa será removida permanentemente.</p>
    <div class="modal-botoes">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirmar" id="btn-confirmar-delete">Remover</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-editar">
  <div class="modal" style="text-align: left;">
    <h3 style="text-align: center; margin-bottom: 16px;">Editar Tarefa</h3>
    
    <div class="form-grupo" style="margin-bottom: 12px;">
      <label for="edit-titulo">Título</label>
      <input id="edit-titulo" type="text" />
    </div>
    
    <div class="form-grupo" style="margin-bottom: 12px;">
      <label for="edit-desc">Descrição</label>
      <textarea id="edit-desc" style="min-height: 60px;"></textarea>
    </div>
    
    <div class="form-grupo" style="margin-bottom: 12px;">
      <label for="edit-prioridade">Prioridade</label>
      <select id="edit-prioridade">
        <option value="baixa">Baixa</option>
        <option value="media">Média</option>
        <option value="alta">Alta</option>
      </select>
    </div>
    
    <div class="form-grupo" style="margin-bottom: 24px;">
      <label for="edit-prazo">Prazo</label>
      <input id="edit-prazo" type="date" />
    </div>
    
    <div class="modal-botoes">
      <button class="btn-cancelar" onclick="fecharModalEditar()">Cancelar</button>
      <button class="btn-confirmar" style="background: var(--fg-color);" onclick="salvarEdicao()">Salvar</button>
    </div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
